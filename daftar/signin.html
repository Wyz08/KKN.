<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Ruang Aman</title>
   <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="signup-viewport">
        <div class="register-card">

            <!-- Tombol X kembali ke Landing Page -->
            <a href="../index.html" class="btn-kembali-signup" title="Tutup">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </a>

            <h1>Masuk</h1>
            <p class="tagline">Selamat datang kembali di ruang amanmu</p>

            <div class="social-login">
                <button class="btn-gray">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
                    <span>Google</span>
                </button>
                <button class="btn-gray">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple" class="invert">
                    <span>Apple</span>
                </button>
            </div>

            <div class="divider">
                <span>ATAU</span>
            </div>

            <form>
                <div class="input-field">
                    <label>Email</label>
                    <input type="email" placeholder="emailkampus@student.ac.id" autocomplete="off">
                </div>

                <div class="input-field">
                    <label>Password</label>
                    <!-- Pembungkus untuk menempatkan ikon mata di dalam input -->
                    <div style="position: relative;">
                        <input type="password" id="passInput" placeholder="••••••••" autocomplete="off" style="width: 100%; padding-right: 40px; box-sizing: border-box;">
                        
                        <!-- Ikon Mata -->
                        <span id="togglePassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #a0a0a0; display: flex;" title="Tampilkan/Sembunyikan Password">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </span>
                    </div>
                </div>

                <div class="lupa-password-container">
                    <a href="reset.html" class="lupa-password">Lupa password?</a>
                </div>

                <button type="submit" class="btn-gold">Masuk</button>
            </form>

            <div class="footer-signup">
                Belum memiliki akun? <a href="signup.html">Daftar</a>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT UNTUK FITUR LIHAT PASSWORD -->
    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passInput = document.getElementById('passInput');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', function () {
            // Ubah tipe input antara password dan text
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);

            // Ubah bentuk ikon mata (terbuka vs tercoret)
            if (type === 'text') {
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        });
    </script>
</body>
</html>
