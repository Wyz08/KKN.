<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Ruang Aman</title>
   <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="signup-viewport">
        <div class="register-card">

            <!-- Tombol X kembali ke Landing Page -->
            <a href="../index.html" class="btn-kembali-signup" title="Tutup">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </a>

            <h1>Masuk</h1>
            <p class="tagline">Selamat datang kembali di ruang amanmu</p>

            <div class="social-login">
                <button class="btn-gray">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
                    <span>Google</span>
                </button>
                <button class="btn-gray">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple" class="invert">
                    <span>Apple</span>
                </button>
            </div>

            <div class="divider">
                <span>ATAU</span>
            </div>

            <form>
                <div class="input-field">
                    <label>Email</label>
                    <input type="email" placeholder="emailkampus@student.ac.id">
                </div>

                <div class="input-field">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••">
                </div>

                <div class="lupa-password-container">
                    <a href="#" class="lupa-password">Lupa password?</a>
                </div>

                <button type="submit" class="btn-gold">Masuk</button>
            </form>

            <div class="footer-signup">
                Belum memiliki akun? <a href="signup.html">Daftar</a>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT UNTUK EFEK DELAY PASSWORD -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Mencari semua input yang awalnya bertipe password
            const passwordInputs = document.querySelectorAll('input[type="password"]');

            passwordInputs.forEach(input => {
                // Ubah ke type text agar kita bisa mengubah karakter jadi titik secara manual via JS
                input.setAttribute('type', 'text');
                input.setAttribute('spellcheck', 'false'); // Matikan ejaan agar tidak ada garis merah
                input.setAttribute('autocomplete', 'off'); // Matikan saran browser agar rapi

                let realPassword = ""; // Variabel menyimpan password asli di belakang layar
                let hideTimer; // Timer untuk delay 1.5 detik

                input.addEventListener('input', function(e) {
                    clearTimeout(hideTimer); // Reset timer tiap kali ada ketikan baru

                    let currentValue = input.value;

                    // Deteksi jika user menghapus (backspace) karakter
                    if (currentValue.length < realPassword.length) {
                        realPassword = realPassword.substring(0, currentValue.length);
                    }
                    // Deteksi jika user menambah (mengetik) karakter
                    else if (currentValue.length > realPassword.length) {
                        // Ambil karakter terakhir yang baru saja diketik dan tambahkan ke password asli
                        let addedChar = currentValue.slice(currentValue.length - realPassword.length);
                        realPassword += addedChar;
                    }

                    // Logika Visual di Layar (Masking)
                    if (realPassword.length > 0) {
                        // Ubah semua huruf jadi titik (•), KECUALI huruf yang paling terakhir diketik
                        let maskedText = '•'.repeat(realPassword.length - 1) + realPassword.slice(-1);
                        input.value = maskedText;

                        // Set waktu 1.5 detik (1500ms) untuk otomatis menyembunyikan huruf terakhir jadi titik
                        hideTimer = setTimeout(() => {
                            input.value = '•'.repeat(realPassword.length);
                        }, 1500);
                    } else {
                        input.value = "";
                    }
                });
            });
        });
    </script>

</body>
</html>
