<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Ruang Aman</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="viewport">
        <div class="register-card">

            <!-- Tombol X kembali ke Landing Page -->
            <a href="../index.html" class="btn-kembali-signup" title="Tutup Pendaftaran">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </a>

            <h1>Daftar</h1>
            <p class="tagline">Ruang aman untuk cerita kampusmu</p>

            <div class="social-login">
                <button class="btn-gray">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
                    <span>Google</span>
                </button>
                <button class="btn-gray">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple" class="invert">
                    <span>Apple</span>
                </button>
            </div>

            <div class="divider">
                <span>ATAU</span>
            </div>

            <form>
                <div class="input-field">
                    <label>Username</label>
                    <input type="text" placeholder="(Disarankan samaran)">
                </div>

                <div class="input-field">
                    <label>Email</label>
                    <input type="email">
                </div>

                <div class="input-field">
                    <label>Password</label>
                    <input type="password">
                </div>

                <button type="submit" class="btn-gold">Daftar</button>
            </form>

            <div class="footer-signup">
                Sudah memiliki akun? <a href="signin.html">Masuk</a>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT UNTUK EFEK DELAY PASSWORD -->
    <script>
        (function() {
            // Cari input password berdasarkan id atau type
            const passInputs = document.querySelectorAll('input[type="password"], #pass-input');

            passInputs.forEach(input => {
                input.setAttribute('type', 'text'); // Ubah ke text agar bisa dimanipulasi
                input.style.fontFamily = 'monospace'; // Titik lebih rapi dan sejajar

                let realPass = "";
                let timer;

                input.addEventListener('input', function(e) {
                    clearTimeout(timer);
                    let val = input.value;

                    // Jika input dikosongkan total
                    if (val === "") {
                        realPass = "";
                        return;
                    }

                    let isDeleting = val.length < realPass.length;

                    // Jika mengetik ulang semuanya atau paste teks baru (tidak ada titik)
                    if (!val.includes('•')) {
                        realPass = val;
                        isDeleting = false;
                    } 
                    // Jika menambah karakter di akhir
                    else if (val.length > realPass.length) {
                        let newChars = val.substring(realPass.length).replace(/•/g, '');
                        realPass += newChars;
                    } 
                    // Jika menghapus karakter (backspace)
                    else if (isDeleting) {
                        realPass = realPass.substring(0, val.length);
                    }

                    // Tampilkan ke layar
                    if (isDeleting) {
                        // Jika habis dihapus, langsung sembunyikan semua (tidak ada delay)
                        input.value = '•'.repeat(realPass.length);
                    } else {
                        // Jika ditambah, perlihatkan 1 huruf terakhir
                        input.value = '•'.repeat(Math.max(0, realPass.length - 1)) + realPass.slice(-1);
                    }

                    // Timer 1.5 detik untuk menyembunyikan huruf terakhir
                    timer = setTimeout(() => {
                        input.value = '•'.repeat(realPass.length);
                    }, 1500);
                });
            });
        })();
    </script>
</body>
</html>
