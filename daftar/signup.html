<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Ruang Aman</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="viewport">
        <div class="register-card">

            <!-- Tombol X kembali ke Landing Page -->
            <a href="../landing.html" class="btn-kembali-signup" title="Tutup Pendaftaran">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </a>

            <h1>Daftar</h1>
            <p class="tagline">Ruang aman untuk cerita kampusmu</p>

            <div class="social-login">
                <button class="btn-gray">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
                    <span>Google</span>
                </button>
                <button class="btn-gray">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple" class="invert">
                    <span>Apple</span>
                </button>
            </div>

            <div class="divider">
                <span>ATAU</span>
            </div>

            <form>
                <div class="input-field">
                    <label>Username</label>
                    <input type="text" placeholder="(Disarankan samaran)">
                </div>

                <div class="input-field">
                    <label>Email</label>
                    <input type="email">
                </div>

                <div class="input-field">
                    <label>Password</label>
                    <input type="password">
                </div>

                <button type="submit" class="btn-gold">Daftar</button>
            </form>

            <div class="footer-signup">
                Sudah memiliki akun? <a href="signin.html">Masuk</a>
            </div>
        </div>
    </div>

</body>
</html>
