<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi - Ruang Aman</title>
    <!-- Menghubungkan ke file CSS gabungan di luar folder -->
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="signup-viewport">
        <div class="register-card">

            <!-- Tombol Kembali ke Signup -->
            <a href="signup.html" class="btn-kembali-signup" title="Kembali">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>

            <!-- Sesuai gambar: Judul rata kiri -->
            <h1 style="font-size: 1.8rem; margin-bottom: 10px; margin-top: 10px;">Daftar</h1>
            <p class="tagline" style="font-size: 0.9rem; line-height: 1.5;">Masukkan kode verifikasi 4 digit yang telah dikirim ke email Anda</p>

            <!-- FORM AMAN DARI BOT -->
            <form onsubmit="event.preventDefault(); window.location.href='../index.html';">
                
                <div class="otp-container">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required autofocus>
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
                </div>

                <div class="teks-bawah-verif">
                    Kode akan kadaluarsa dalam : <span id="timer">00 : 56</span><br>
                    Belum menerima kode? : <a href="#">Kirim ulang kode</a>
                </div>

                <button type="submit" class="btn-gold" style="margin-top: 0;">Verifikasi</button>
            </form>

        </div>
    </div>

    <!-- SCRIPT AGAR INPUT OTOMATIS PINDAH KE KOTAK SEBELAHNYA SAAT DIKETIK -->
    <script>
        const inputs = document.querySelectorAll('.otp-input');

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                // Hanya izinkan angka
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                
                if (e.target.value !== '') {
                    // Pindah ke kotak berikutnya jika ada
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                }
            });

            // Hapus dan mundur ke kotak sebelumnya jika backspace ditekan
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '') {
                    if (index > 0) {
                        inputs[index - 1].focus();
                    }
                }
            });
        });
    </script>
</body>
</html>
