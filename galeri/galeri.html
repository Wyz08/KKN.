<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri - Ruang Aman</title>
    <!-- Menghubungkan ke CSS Utama -->
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=ADLaM+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="app-body gallery-page">

    <!-- Efek Cahaya Latar Belakang (Ambient Glow) -->
    <div class="ambient-glow"></div>

    <!-- HEADER ATAS (Sekarang Full Width / Tembus Kiri Kanan) -->
    <header class="gallery-full-header">
        <div class="gallery-header-inner">
            <a href="javascript:history.back()" class="icon-btn" title="Kembali">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h1 class="header-title">Koleksiku</h1>
            <!-- Spacer kosong agar teks tetap presisi di tengah -->
            <div style="width: 28px;"></div>
        </div>
    </header>

    <!-- CONTAINER TENGAH (Ukuran Tetap Dipertahankan) -->
    <main class="feed-container gallery-main-content">
        
        <!-- Toggle Switch (Tersimpan / Unggahan) -->
        <div class="gallery-toggle-wrapper">
            <div class="gallery-toggle-container">
                <button class="gallery-toggle-btn active" onclick="switchTab(this)">Tersimpan</button>
                <button class="gallery-toggle-btn" onclick="switchTab(this)">Unggahan</button>
            </div>
        </div>

        <!-- Area Konten Utama (Empty State) -->
        <div class="gallery-empty-state">
            <!-- Ikon Bookmark Besar -->
            <div class="empty-icon-container">
                <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <h3>Belum ada yang disimpan</h3>
            <p>Simpan postingan atau meme favoritmu untuk dibaca lagi nanti.</p>
        </div>

    </main>

    <!-- Tombol Posting Melayang (FAB) -->
    <button class="fab-extended" onclick="showToast('Membuka form buat postingan...')">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
        <span>Posting Keresahanmu</span>
    </button>

    <!-- Navigasi Bawah (Bottom Nav) -->
    <nav class="bottom-nav">
        <a href="../feed.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
        </a>
        <a href="galeri.html" class="nav-item active">
           
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <span>Galeri</span>
        </a>
        <a href="../Notifikasi/Notifikasi.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <span>Notif</span>
        </a>
        <a href="../profil/profil.html" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profil</span>
        </a>
    </nav>

    <!-- Script Sederhana untuk Tab & Toast -->
    <script>
        function switchTab(clickedBtn) {
            document.querySelectorAll('.gallery-toggle-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            clickedBtn.classList.add('active');
        }

        function showToast(message) {
            let toast = document.getElementById('custom-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'custom-toast';
                toast.style.cssText = 'position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #FCB201; color: #120f0c; padding: 12px 24px; border-radius: 30px; font-weight: 700; font-size: 0.9rem; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; box-shadow: 0 4px 15px rgba(252, 178, 1, 0.4); text-align: center; white-space: nowrap;';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.style.opacity = '1';
            clearTimeout(toast.timeoutId);
            toast.timeoutId = setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }
    </script>
</body>
</html>
